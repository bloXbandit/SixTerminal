<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stelic Insights</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f4f8;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    font-size: 13px;
  }

  /* ── Top header bar ── */
  .header {
    background: linear-gradient(90deg, #1a3a5c 0%, #0078D4 100%);
    color: white;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    height: 46px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-left .logo { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
  .header-left .tagline { font-size: 11px; opacity: 0.8; }
  .header-right { font-size: 11px; opacity: 0.7; }

  /* ── Main body split ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Left: Power BI panel ── */
  .pbi-panel {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-right: 2px solid #cce0f5;
    min-width: 0;
  }
  .pbi-label {
    background: #1a3a5c;
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .pbi-panel iframe {
    flex: 1;
    width: 100%;
    border: none;
  }

  /* ── Right: Copilot panel ── */
  .copilot-panel {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #ffffff;
    overflow: hidden;
  }

  .copilot-header {
    background: #0078D4;
    color: white;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .subheader {
    background: #f0f6ff;
    border-bottom: 1px solid #cce0f5;
    padding: 3px 10px;
    font-size: 10px;
    color: #0078D4;
    flex-shrink: 0;
  }

  .quick-bar {
    padding: 5px 8px;
    display: flex;
    gap: 4px;
    border-bottom: 1px solid #e0eaf4;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .quick-btn {
    background: #f0f6ff;
    color: #0078D4;
    border: 1px solid #cce0f5;
    border-radius: 3px;
    padding: 2px 8px;
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quick-btn:hover { background: #0078D4; color: white; }

  .upload-bar {
    padding: 4px 10px;
    border-bottom: 1px solid #e0eaf4;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .upload-bar label {
    font-size: 10px;
    color: #0078D4;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .upload-bar input[type="file"] { display: none; }
  .ctx-badge {
    font-size: 10px;
    background: #e8f2fc;
    color: #0078D4;
    border-radius: 3px;
    padding: 2px 6px;
    max-width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .clear-ctx {
    font-size: 10px;
    color: #dc3545;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    min-height: 0;
  }

  .msg {
    max-width: 95%;
    padding: 6px 10px;
    border-radius: 6px;
    line-height: 1.45;
    font-size: 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    background: #e8f2fc;
    color: #1a3a5c;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .msg.assistant {
    background: #f8f9fa;
    color: #212529;
    align-self: flex-start;
    border: 1px solid #e0eaf4;
    border-bottom-left-radius: 2px;
  }
  .msg.typing {
    background: #f8f9fa;
    border: 1px solid #e0eaf4;
    align-self: flex-start;
    color: #6c757d;
    font-style: italic;
    font-size: 11px;
  }

  .input-area {
    padding: 7px 8px;
    border-top: 1px solid #e0eaf4;
    display: flex;
    gap: 5px;
    flex-shrink: 0;
    background: #fff;
  }
  textarea {
    flex: 1;
    border: 1.5px solid #0078D4;
    border-radius: 4px;
    padding: 6px 9px;
    font-family: inherit;
    font-size: 12px;
    resize: none;
    height: 56px;
    background: #f9fbfe;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #1a3a5c; }
  .send-btn {
    background: #0078D4;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 0 12px;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.15s;
    align-self: stretch;
  }
  .send-btn:hover { background: #1a3a5c; }
  .send-btn:disabled { background: #b0c4de; cursor: not-allowed; }

  /* ── Resize handle ── */
  .resize-handle {
    width: 4px;
    background: #cce0f5;
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .resize-handle:hover { background: #0078D4; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">STELIC INSIGHTS</span>
    <span class="tagline">Project Intelligence Platform</span>
  </div>
  <div class="header-right">AI Sandbox · Public Storage Dashboard</div>
</div>

<div class="main">

  <!-- Left: Power BI -->
  <div class="pbi-panel" id="pbiPanel">
    <div class="pbi-label">📊 LIVE DASHBOARD</div>
    <iframe
      title="Public Storage Dashboard"
      src="https://app.powerbi.com/view?r=eyJrIjoiZGY0MGRiMzUtYjNjYS00ZjUwLWE4NGUtZDUxZjNmNzk3OWYzIiwidCI6IjNjMDI3MWIxLWNjMWQtNGRlZC05ZWFlLWQwYzVlNDViZmExNiIsImMiOjZ9"
      allowFullScreen="true">
    </iframe>
  </div>

  <!-- Resize handle -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- Right: Copilot -->
  <div class="copilot-panel" id="copilotPanel">
    <div class="copilot-header">🤖 Stelic Copilot</div>
    <div class="subheader">AI assistant · schedules, documents &amp; data</div>

    <div class="quick-bar">
      <button class="quick-btn" onclick="sendQuick('Project status?')">Status?</button>
      <button class="quick-btn" onclick="sendQuick('Top risks?')">Risks?</button>
      <button class="quick-btn" onclick="sendQuick('Critical path?')">Critical path?</button>
      <button class="quick-btn" onclick="sendQuick('Schedule health?')">Health?</button>
    </div>

    <div class="upload-bar">
      <label>
        <input type="file" id="fileInput" accept=".xer,.xml,.txt,.md,.csv,.pdf" onchange="handleFile(this)">
        📎 Attach file
      </label>
      <span id="ctxBadge" class="ctx-badge" style="display:none"></span>
      <button id="clearCtx" class="clear-ctx" style="display:none" onclick="clearContext()">✕</button>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="msg assistant">👋 Hi — I'm Stelic Copilot. Ask me about the dashboard, your schedule, or upload a file for context.</div>
    </div>

    <div class="input-area">
      <textarea id="msgInput" placeholder="Ask about the project..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script>
  let messages = [];
  let context = "";

  // ── Drag resize ──
  const handle = document.getElementById("resizeHandle");
  const pbi = document.getElementById("pbiPanel");
  const copilot = document.getElementById("copilotPanel");
  let dragging = false;

  handle.addEventListener("mousedown", () => { dragging = true; document.body.style.cursor = "col-resize"; });
  document.addEventListener("mouseup", () => { dragging = false; document.body.style.cursor = ""; });
  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const container = document.querySelector(".main");
    const rect = container.getBoundingClientRect();
    const newPbiWidth = e.clientX - rect.left;
    const minPbi = 300, minCopilot = 260;
    const maxPbi = rect.width - minCopilot - 4;
    if (newPbiWidth >= minPbi && newPbiWidth <= maxPbi) {
      pbi.style.flex = "none";
      pbi.style.width = newPbiWidth + "px";
    }
  });

  // ── Chat logic ──
  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendQuick(q) {
    document.getElementById("msgInput").value = q;
    sendMessage();
  }

  function clearContext() {
    context = "";
    document.getElementById("ctxBadge").style.display = "none";
    document.getElementById("clearCtx").style.display = "none";
    document.getElementById("fileInput").value = "";
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      context = `[File: ${file.name}]\n${e.target.result.substring(0, 3000)}`;
      document.getElementById("ctxBadge").textContent = "📌 " + file.name;
      document.getElementById("ctxBadge").style.display = "inline-block";
      document.getElementById("clearCtx").style.display = "inline";
    };
    reader.readAsText(file);
  }

  function appendMsg(role, text) {
    const area = document.getElementById("chatArea");
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const input = document.getElementById("msgInput");
    const btn = document.getElementById("sendBtn");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    btn.disabled = true;

    appendMsg("user", text);
    messages.push({ role: "user", content: text });

    const typing = appendMsg("typing", "Thinking...");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: messages.slice(-10), context: context })
      });
      const data = await res.json();
      typing.remove();
      if (data.error) {
        appendMsg("assistant", "⚠️ " + data.error);
      } else {
        appendMsg("assistant", data.reply);
        messages.push({ role: "assistant", content: data.reply });
      }
    } catch (err) {
      typing.remove();
      appendMsg("assistant", "❌ Connection error. Please try again.");
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
